<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CipherSign — confidential signing on Flare. Keys in a TEE. Sign only when policy allows."
    />
    <meta name="theme-color" content="#000000" />
    <title>CipherSign</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="nav">
      <a class="logo" href="/">
        <img src="/favicon.svg" width="22" height="21" alt="" />
        CipherSign
      </a>
      <a
        class="nav-link"
        href="https://github.com/thesithunyein/cipher-sign"
        target="_blank"
        rel="noreferrer"
        >GitHub</a
      >
    </header>

    <main>
      <section class="intro">
        <h1>Sign only when policy says yes.</h1>
        <p>
          Private keys stay in a Flare TEE. Recipients, caps, and expiry are
          enforced in the enclave.
        </p>
      </section>

      <section class="app" aria-label="Vault">
        <div class="segment" role="tablist" aria-label="Use case">
          <button type="button" class="seg active" data-scenario="payroll" role="tab" aria-selected="true">Payroll</button>
          <button type="button" class="seg" data-scenario="otc" role="tab" aria-selected="false">OTC</button>
          <button type="button" class="seg" data-scenario="treasury" role="tab" aria-selected="false">Treasury</button>
        </div>

        <div class="panel">
          <div class="panel-top">
            <h2>Policy</h2>
            <span class="chip" id="policyChip">Unlocked</span>
          </div>
          <label>
            Allowed recipient
            <input id="recipient" type="text" spellcheck="false" autocomplete="off"
              value="0x1111111111111111111111111111111111111111" />
          </label>
          <div class="row">
            <label>
              Max amount
              <input id="maxAmount" type="text" inputmode="numeric" value="1000000" />
            </label>
            <label>
              Expires
              <input id="expiresAt" type="text" inputmode="numeric" value="0" />
            </label>
          </div>
          <button type="button" id="setPolicy" class="btn">Lock policy</button>
        </div>

        <div class="panel">
          <div class="panel-top">
            <h2>Request</h2>
            <span class="chip" id="signChip">Waiting</span>
          </div>
          <label>
            Recipient
            <input id="intentRecipient" type="text" spellcheck="false" autocomplete="off"
              value="0x1111111111111111111111111111111111111111" />
          </label>
          <div class="row">
            <label>
              Amount
              <input id="intentAmount" type="text" inputmode="numeric" value="500000" />
            </label>
            <label>
              Deadline
              <input id="intentDeadline" type="text" inputmode="numeric" value="0" />
            </label>
          </div>
          <div class="actions">
            <button type="button" id="trySign" class="btn" disabled>Sign</button>
            <button type="button" id="tryBad" class="btn quiet" disabled>Overspend</button>
          </div>
        </div>

        <div class="status" id="status" data-kind="idle">
          <strong id="statusTitle">Ready</strong>
          <span id="statusBody">Lock a policy, then sign — or try an overspend.</span>
        </div>
      </section>
    </main>

    <footer>
      <span>Flare Confidential Compute</span>
      <a
        href="https://coston2-explorer.flare.network/address/0x79bB3e509B6a0f43d506a761Fb022221c3FF0Ee9"
        target="_blank"
        rel="noreferrer"
        >Coston2</a
      >
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
