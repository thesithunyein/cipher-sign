# Copy .env.example to .env and fill in the values before running.
# Copy config/proxy/extension_proxy.coston2.toml.example to
#   config/proxy/extension_proxy.toml and fill in DB credentials.
#
# Host port 6674 = external proxy (tunnel this). See docs/SETUP.md.
#
# Usage:
#   docker compose up -d

services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "${REDIS_BIND:-127.0.0.1:6383}:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ext-proxy:
    build:
      context: proxy/
      dockerfile: Dockerfile
    volumes:
      - ./config/proxy/extension_proxy.toml:/app/config/config.toml:ro
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY:?Set PRIVATE_KEY in .env}
      - DIRECT_API_KEY=${DIRECT_API_KEY:-}
    ports:
      # Guide tunnels to 6674 (external proxy API). Internal stays 6675.
      - "${EXT_PROXY_INTERNAL_BIND:-0.0.0.0:6675}:6663"
      - "${EXT_PROXY_EXTERNAL_BIND:-0.0.0.0:6674}:6664"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:6663/healthy"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  extension-tee:
    build:
      context: ${LANGUAGE:-go}/
      dockerfile: Dockerfile
    env_file:
      - .env
      - path: ./config/extension.env
        required: false
    environment:
      - INITIAL_OWNER=${INITIAL_OWNER:?Set INITIAL_OWNER in .env}
      - EXTENSION_ID=${EXTENSION_ID:?Set EXTENSION_ID in .env}
      - PROXY_URL=http://ext-proxy:6663
      - SIGN_PORT=8882
      - EXTENSION_PORT=8883
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MODE=1
      - LOCAL_MODE=${LOCAL_MODE:-false}
      - SIMULATED_TEE=${SIMULATED_TEE:-true}
      # Must match proxy chain_id (114) or TEE_INFO signature verify panics
      - CHAIN_ID=${CHAIN_ID:-114}
      - CHAIN_URL=${CHAIN_URL:-https://coston2-api.flare.network/ext/C/rpc}
      - GOVERNANCE_SIGNERS=${GOVERNANCE_SIGNERS:-${INITIAL_OWNER}}
      - GOVERNANCE_THRESHOLD=${GOVERNANCE_THRESHOLD:-1}
    depends_on:
      ext-proxy:
        condition: service_healthy
    # Give the simulated TEE a moment after proxy is healthy
    restart: on-failure
